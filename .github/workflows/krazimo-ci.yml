name: Krazimo CI
on:
  pull_request:
    branches: [dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test

      - name: Lint
        run: bun lint

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Test
        run: bun test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
