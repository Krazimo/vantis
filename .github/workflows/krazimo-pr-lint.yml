name: Krazimo PR Lint
on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [dev]

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            chore
            docs
            test
            perf
            release
            hotfix
          requireScope: false
          subjectPattern: ^[a-z].+$
          subjectPatternError: |
            PR title "{subject}" must start with a lowercase letter.
            Example: "feat: add user login" or "fix(auth): handle expired tokens"
